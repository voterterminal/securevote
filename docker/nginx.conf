# ==========================================
# VoteTerminal — nginx config (Docker)
# ==========================================
# Handles two domains:
#   voterterminal.com        → marketing landing page (served by Node/React)
#   {subdomain}.domain.com   → voting app + /api proxy to Node.js
#
# Replace YOUR_DOMAIN with your actual domain before use.
# ==========================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main site ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name voterterminal.com www.voterterminal.com;

    ssl_certificate     /etc/letsencrypt/live/voterterminal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voterterminal.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Proxy everything to Node.js (which serves the landing page + API)
    location / {
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Voting app subdomain (e.g. gdp.voterterminal.com) ───────────────────────
server {
    listen 443 ssl http2;
    server_name ~^(?<subdomain>.+)\.voterterminal\.com$;

    ssl_certificate     /etc/letsencrypt/live/voterterminal.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voterterminal.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Pass subdomain to backend so it can identify the tenant
    location / {
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
