<VirtualHost *:443>
    ServerName tenants.voterterminal.com
    ServerAlias *.voterterminal.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/voterterminal.com-0001/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/voterterminal.com-0001/privkey.pem

    DocumentRoot /var/www/voterterm/frontend/build

    <Directory /var/www/voterterm/frontend/build>
        Options -Indexes
        AllowOverride All
        Require all granted
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>

    ProxyPreserveHost On
    ProxyPass /api http://localhost:3002/api
    ProxyPassReverse /api http://localhost:3002/api
</VirtualHost>
