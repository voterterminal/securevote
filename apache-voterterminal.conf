# ==========================================
# VoteTerminal — Apache Virtual Hosts
# ==========================================
# Two domains:
#   voterterminal.com        → landing page  (/var/www/voterterm/landing/)
#   gdp.voterterminal.com    → voting app    (/var/www/voterterm/frontend/build/ + Node.js API)
#
# Install:
#   sudo cp apache-voterterminal.conf /etc/apache2/sites-available/voterterminal.conf
#   sudo a2ensite voterterminal.conf
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# Then run certbot for SSL (see DEPLOY.md Step 9)
# ==========================================

# ── MAIN SITE: voterterminal.com ──────────────────────────────────────────
<VirtualHost *:80>
    ServerName voterterminal.com
    ServerAlias www.voterterminal.com

    DocumentRoot /var/www/voterterm/landing

    <Directory /var/www/voterterm/landing>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # Forward /api requests to the tenant-server on port 3002
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3002/api
    ProxyPassReverse /api http://localhost:3002/api

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/voterterminal-error.log
    CustomLog ${APACHE_LOG_DIR}/voterterminal-access.log combined
</VirtualHost>

# ── GWINNETT DEMOCRATIC PARTY: gdp.voterterminal.com ─────────────────────
<VirtualHost *:80>
    ServerName gdp.voterterminal.com

    # Serve the React voting app
    DocumentRoot /var/www/voterterm/frontend/build

    # Forward all /api requests to Node.js on port 3001
    ProxyPreserveHost On
    ProxyPass /api http://localhost:3001/api
    ProxyPassReverse /api http://localhost:3001/api

    # React Router — send all non-file requests to index.html
    <Directory /var/www/voterterm/frontend/build>
        Options -Indexes
        AllowOverride All
        Require all granted
        FallbackResource /index.html
    </Directory>

    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog ${APACHE_LOG_DIR}/gdp-voterterminal-error.log
    CustomLog ${APACHE_LOG_DIR}/gdp-voterterminal-access.log combined
</VirtualHost>
